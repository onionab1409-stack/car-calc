# ============================================
# 🌐 Nginx Config — Car-Calc
# app.americanautohouse.com
# ============================================
# Установка:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/car-calc
#   sudo ln -s /etc/nginx/sites-available/car-calc /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================

# Rate limiting — защита от DDoS
limit_req_zone $binary_remote_addr zone=app:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Upstream — PM2 на порту 3000
upstream car_calc {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP → HTTPS редирект
server {
    listen 80;
    listen [::]:80;
    server_name app.americanautohouse.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — основной сервер
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.americanautohouse.com;

    # ─── SSL (Let's Encrypt) ───
    ssl_certificate     /etc/letsencrypt/live/app.americanautohouse.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.americanautohouse.com/privkey.pem;

    # Современные параметры SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ─── Заголовки для Telegram Mini App ───
    add_header X-Frame-Options "ALLOWALL" always;
    add_header Content-Security-Policy "frame-ancestors *;" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── Gzip сжатие ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ─── Статика Next.js (кэш 1 год) ───
    location /_next/static/ {
        proxy_pass http://car_calc;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Публичные файлы ───
    location /favicon.ico {
        proxy_pass http://car_calc;
        expires 30d;
        access_log off;
    }

    # ─── API эндпоинты (строгий rate limit) ───
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://car_calc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Таймауты для API
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ─── Health check (без rate limit) ───
    location /api/health {
        proxy_pass http://car_calc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ─── Всё остальное (Next.js pages) ───
    location / {
        limit_req zone=app burst=50 nodelay;

        proxy_pass http://car_calc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Таймауты
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Буферы
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # ─── Логи ───
    access_log /var/log/nginx/car-calc.access.log;
    error_log  /var/log/nginx/car-calc.error.log;

    # ─── Лимиты ───
    client_max_body_size 5M;
}
